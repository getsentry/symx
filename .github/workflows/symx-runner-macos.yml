name: symx on macOS
permissions:
  actions: read
  contents: read

on:
  workflow_call:
    inputs:
      job_name:
        required: true
        type: string
      symx_step:
        required: true
        type: string
      symx_run:
        required: true
        type: string
    secrets:
      SENTRY_DSN:
        required: true
      SLACK_WEBHOOK_URL:
        required: false

jobs:
  symx-macos-job:
    name: ${{ inputs.job_name }}
    runs-on: ${{ matrix.runner_provider == 'bitrise' && fromJSON('["bitrise_pool_name:tahoe"]') || fromJSON('["ghcr.io/cirruslabs/macos-runner:sequoia,runner_group_id:10"]') }}
    strategy:
      matrix:
        runner_provider: [cirrus, bitrise]
    permissions:
      actions: "read"
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Auth
        id: auth
        continue-on-error: true
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/868781662168/locations/global/workloadIdentityPools/prod-github/providers/github-oidc-pool
          service_account: symx-downloader@sac-prod-sa.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        id: setup_gcloud
        if: ${{ steps.auth.outcome == 'success' }}
        continue-on-error: true
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          version: ">= 363.0.0"

      - name: Install dependencies
        id: install_dependencies
        if: ${{ steps.auth.outcome == 'success' && steps.setup_gcloud.outcome == 'success' }}
        continue-on-error: true
        run: |
          mkdir -p .github/logs
          set -o pipefail
          {
            set -euo pipefail
            curl -LsSf --retry 6 --retry-delay 10 --retry-all-errors https://astral.sh/uv/install.sh | sh
            echo "PATH=/Users/runner/.local/bin:$PATH" >> $GITHUB_ENV
            export PATH="/Users/runner/.local/bin:$PATH"
            uv --version
            uv sync
            brew install tree
            curl -LsSf --retry 6 --retry-delay 10 --retry-all-errors https://github.com/getsentry/symbolicator/releases/latest/download/symsorter-Darwin-universal > symsorter
            chmod +x symsorter
            file symsorter
            ./symsorter --version
            pwd
            ls -la
          } 2>&1 | tee .github/logs/install-dependencies.log

      - name: Install ipsw
        id: install_ipsw
        if: ${{ steps.auth.outcome == 'success' && steps.setup_gcloud.outcome == 'success' && steps.install_dependencies.outcome == 'success' }}
        continue-on-error: true
        uses: ./.github/actions/install-ipsw
        with:
          platform: macos

      - name: ${{ inputs.symx_step }}
        id: symx
        if: ${{ steps.auth.outcome == 'success' && steps.setup_gcloud.outcome == 'success' && steps.install_dependencies.outcome == 'success' && steps.install_ipsw.outcome == 'success' }}
        continue-on-error: true
        run: |
          mkdir -p .github/logs
          set -o pipefail
          {
            set -euo pipefail
            uv run python scripts/run_symx_gha.py
          } 2>&1 | tee .github/logs/symx.log
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYMX_RUN: ${{ inputs.symx_run }}

      - name: Notify on failure
        id: notify_failure
        if: ${{ always() }}
        continue-on-error: true
        uses: ./.github/actions/notify-slack-on-failure
        with:
          github_token: ${{ github.token }}
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          workflow_name: ${{ github.workflow }}
          job_name: ${{ inputs.job_name }}
          steps_json: >-
            [
              {"name":"Auth","outcome":${{ toJSON(steps.auth.outcome) }},"fallback_snippet":"uses google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0"},
              {"name":"Set up Cloud SDK","outcome":${{ toJSON(steps.setup_gcloud.outcome) }},"fallback_snippet":"uses google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1"},
              {"name":"Install dependencies","outcome":${{ toJSON(steps.install_dependencies.outcome) }},"log_path":"install-dependencies.log","fallback_snippet":"Install uv dependencies and symsorter."},
              {"name":"Install ipsw","outcome":${{ toJSON(steps.install_ipsw.outcome) }},"log_path":"install-ipsw.log","fallback_snippet":"Install ipsw release tarball."},
              {"name":${{ toJSON(inputs.symx_step) }},"outcome":${{ toJSON(steps.symx.outcome) }},"log_path":"symx.log","fallback_snippet":${{ toJSON(inputs.symx_run) }}}
            ]

      - name: Fail workflow after notification
        if: ${{ always() && (steps.auth.outcome == 'failure' || steps.setup_gcloud.outcome == 'failure' || steps.install_dependencies.outcome == 'failure' || steps.install_ipsw.outcome == 'failure' || steps.symx.outcome == 'failure') }}
        run: exit 1
